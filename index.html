<!DOCTYPE html>
<html>
	<head>
		<title>Easter 2026</title>

		<style>
			div 
			{
				border: 1px solid rgb(255, 0, 0);
			}

			h1
			{
				font-family: verdana;
				text-align: center;
			}

			#container 
			{
				margin: 100px auto 0 auto;
				border-radius:  50px;
				border: 5px solid rgb(255, 200, 0);
				width: 300px;
				height: 200px;
				overflow: hidden;
			}

			#aura
			{
				width: 400px;
				height: 400px;
				margin-top: -100px;
				margin-left: -50px;
				border-radius: 50%;
				background-color: rgb(100, 0, 100);
			}

			#hills
			{
				width: 300px;
				height: 100px;
				margin-top: -120px;
			}

			.hill
			{
				width: 150px;
				height: 150px;
				border-radius: 10px;
				background-color: rgb(0, 0, 0);
				transform-origin: 50% 50%;
				transform: rotate(45deg);
			}

			.hill:nth-of-type(1)
			{
				margin-left: -50px;
			}

			.hill:nth-of-type(2)
			{
				margin-top: -180px;
				margin-left: 75px;
			}	

			.hill:nth-of-type(3)
			{
				margin-top: -120px;
				margin-left: 200px;
			}	

			.cross
			{
				font-size: 5em;
				font-family: arial;
				font-weight: bold;
				margin-top: -270px;
				text-align: center;
			}					
		</style>

		<script src="https://code.jquery.com/jquery-3.7.1.js"></script>
		<script src="https://code.jquery.com/ui/1.13.3/jquery-ui.js"></script>
	</head>

	<body>
		<div id="container">
			<div id="aura" class="unrotated">
				
			</div>	

			<div id="hills">
				<div class="hill"></div>
				<div class="hill"></div>
				<div class="hill"></div>
				<div class="cross">&#10013;</div>
			</div>
		</div>

		<h1>HAPPY EASTER</h1>
	</body>

	<script>

	</script>
</html>
